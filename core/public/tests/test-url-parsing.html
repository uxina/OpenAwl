<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL参数解析功能测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .test-section h2 {
            color: #34495e;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .test-case {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #e0e0e0;
        }
        
        .test-case.pass {
            border-left-color: #27ae60;
            background: #d5f4e6;
        }
        
        .test-case.fail {
            border-left-color: #e74c3c;
            background: #fadbd8;
        }
        
        .test-case.running {
            border-left-color: #f39c12;
            background: #fdebd0;
        }
        
        .test-status {
            font-size: 20px;
            margin-right: 12px;
        }
        
        .test-info {
            flex: 1;
        }
        
        .test-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        
        .test-detail {
            font-size: 13px;
            color: #666;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            margin: 20px auto;
        }
        
        .btn:hover {
            background: #5a6fd6;
        }
        
        .summary {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .summary h3 {
            margin-bottom: 10px;
        }
        
        .summary-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .demo-section {
            margin-top: 30px;
            padding: 20px;
            background: #e3f2fd;
            border-radius: 12px;
        }
        
        .demo-section h3 {
            color: #1976d2;
            margin-bottom: 15px;
        }
        
        .demo-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .demo-link {
            display: inline-block;
            padding: 8px 16px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid #667eea;
            transition: all 0.2s;
        }
        
        .demo-link:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 URL参数解析功能测试</h1>
        <p class="subtitle">测试从URL参数自动解析房间号功能</p>
        
        <div class="test-section">
            <h2>📋 测试用例</h2>
            <div id="testCases">
                <div class="test-case running">
                    <span class="test-status">⏳</span>
                    <div class="test-info">
                        <div class="test-name">等待开始测试...</div>
                        <div class="test-detail">点击"开始测试"按钮运行所有测试用例</div>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn" onclick="runAllTests()">🚀 开始测试</button>
        
        <div class="summary" id="summary" style="display: none;">
            <h3>📊 测试总结</h3>
            <div class="summary-stats">
                <div class="stat">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总测试数</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="passCount">0</div>
                    <div class="stat-label">通过</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="failCount">0</div>
                    <div class="stat-label">失败</div>
                </div>
            </div>
        </div>
        
        <div class="demo-section">
            <h3>🔗 快速测试链接</h3>
            <p style="margin-bottom: 15px; color: #555;">点击以下链接测试不同场景：</p>
            <div class="demo-links">
                <a href="/player-modular.html?roomId=1234" class="demo-link" target="_blank">房间号: 1234</a>
                <a href="/player-modular.html?roomId=5258" class="demo-link" target="_blank">房间号: 5258</a>
                <a href="/player-modular.html?roomId=ABCD" class="demo-link" target="_blank">房间号: ABCD</a>
                <a href="/player-modular.html?roomId=9999&player=1" class="demo-link" target="_blank">多参数</a>
                <a href="/player-modular.html" class="demo-link" target="_blank">无参数</a>
            </div>
        </div>
    </div>

    <script>
        // 测试用例
        const testCases = [
            {
                name: '函数存在性检查',
                description: 'getRoomIdFromUrl函数是否已定义',
                test: () => {
                    return typeof getRoomIdFromUrl === 'function';
                }
            },
            {
                name: '标准房间号解析',
                description: 'URL: ?roomId=1234',
                url: '?roomId=1234',
                expected: '1234',
                test: () => {
                    return testUrlParsing('?roomId=1234', '1234');
                }
            },
            {
                name: '字母房间号解析',
                description: 'URL: ?roomId=ABCD',
                url: '?roomId=ABCD',
                expected: 'ABCD',
                test: () => {
                    return testUrlParsing('?roomId=ABCD', 'ABCD');
                }
            },
            {
                name: '多参数解析',
                description: 'URL: ?roomId=5258&player=1',
                url: '?roomId=5258&player=1',
                expected: '5258',
                test: () => {
                    return testUrlParsing('?roomId=5258&player=1', '5258');
                }
            },
            {
                name: '空参数处理',
                description: 'URL: (无参数)',
                url: '',
                expected: null,
                test: () => {
                    return testUrlParsing('', null);
                }
            },
            {
                name: '无效参数处理',
                description: 'URL: ?other=param',
                url: '?other=param',
                expected: null,
                test: () => {
                    return testUrlParsing('?other=param', null);
                }
            }
        ];
        
        let originalUrl = window.location.search;
        
        // 测试URL解析
        function testUrlParsing(url, expected) {
            // 临时修改URL
            window.history.replaceState({}, '', url);
            
            // 调用被测试函数
            const result = getRoomIdFromUrl();
            
            return result === expected;
        }
        
        // 运行所有测试
        async function runAllTests() {
            const container = document.getElementById('testCases');
            container.innerHTML = '';
            
            let passCount = 0;
            let failCount = 0;
            
            for (let i = 0; i < testCases.length; i++) {
                const testCase = testCases[i];
                
                // 显示运行中状态
                const runningDiv = document.createElement('div');
                runningDiv.className = 'test-case running';
                runningDiv.innerHTML = `
                    <span class="test-status">⏳</span>
                    <div class="test-info">
                        <div class="test-name">${testCase.name}</div>
                        <div class="test-detail">${testCase.description} - 测试中...</div>
                    </div>
                `;
                container.appendChild(runningDiv);
                
                // 执行测试
                await new Promise(resolve => setTimeout(resolve, 100));
                const passed = testCase.test();
                
                // 更新状态
                runningDiv.className = `test-case ${passed ? 'pass' : 'fail'}`;
                runningDiv.innerHTML = `
                    <span class="test-status">${passed ? '✅' : '❌'}</span>
                    <div class="test-info">
                        <div class="test-name">${testCase.name}</div>
                        <div class="test-detail">${testCase.description}${testCase.url ? `<br>期望: ${testCase.expected}` : ''}</div>
                    </div>
                `;
                
                if (passed) {
                    passCount++;
                } else {
                    failCount++;
                }
            }
            
            // 恢复原始URL
            window.history.replaceState({}, '', originalUrl);
            
            // 显示总结
            document.getElementById('summary').style.display = 'block';
            document.getElementById('totalCount').textContent = testCases.length;
            document.getElementById('passCount').textContent = passCount;
            document.getElementById('failCount').textContent = failCount;
            
            // 滚动到总结
            document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
    
    <!-- 引入被测试的代码 -->
    <script>
        // 从URL参数获取房间号（复制自player-modular.html）
        function getRoomIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('roomId');
        }
    </script>
</body>
</html>
