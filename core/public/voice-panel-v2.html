<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎭 阿瓦隆语音主控面板 V2</title>
    <style>
        /* ===== CSS变量系统 ===== */
        :root {
            --primary-500: #667eea;
            --primary-600: #5a67d8;
            --success: #00d4aa;
            --success-light: rgba(0, 212, 170, 0.15);
            --warning: #f39c12;
            --warning-light: rgba(243, 156, 18, 0.15);
            --danger: #e74c3c;
            --danger-light: rgba(231, 76, 60, 0.15);
            --info: #3498db;
            --bg-dark: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.1);
            --transition-normal: 300ms;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #16213e 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: var(--space-4);
            line-height: 1.6;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }

        .main-panel {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 { font-size: 22px; font-weight: 700; margin-bottom: var(--space-1); }
        .header-left .subtitle { font-size: 13px; opacity: 0.8; }

        .header-right {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .player-count-display {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            background: rgba(0, 0, 0, 0.2);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .player-count-display .count {
            font-size: 18px;
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }

        .btn-count {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-count:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.1); }

        .btn-create-room {
            padding: 0 var(--space-4);
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
            height: 40px;
            text-decoration: none;
        }

        .btn-lobby {
            padding: 0 var(--space-4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            height: 40px;
            text-decoration: none;
        }

        .btn-lobby:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-create-room:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 170, 0.4);
        }

        .btn-create-room:disabled {
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            box-shadow: none;
        }

        .panel-body { padding: var(--space-5); }

        .header-bar {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-4);
            border: 1px solid var(--border-color);
        }

        .status-item {
            text-align: center;
            padding: var(--space-3);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .status-item .label { font-size: 12px; color: var(--text-secondary); margin-bottom: var(--space-2); letter-spacing: 1px; }
        .status-item .value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
        .status-item .value.highlight { color: #ff6b6b; }
        .status-item .value.success { color: var(--success); }

        /* 房间号链接样式 */
        .room-id-container {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .room-link {
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-link:hover .value {
            color: var(--success);
            text-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: var(--radius-sm);
            padding: var(--space-1) var(--space-2);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.2);
            opacity: 1;
            transform: scale(1.1);
        }

        .btn-copy.copied {
            background: var(--success);
            opacity: 1;
        }

        .game-visualization {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            border: 1px solid var(--border-color);
        }

        .game-visualization h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: var(--space-3); letter-spacing: 1px; }

        .mission-track { display: flex; justify-content: space-between; gap: var(--space-3); }

        .mission-dot {
            flex: 1;
            aspect-ratio: 1;
            max-width: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            transition: all var(--transition-normal);
            position: relative;
        }

        .mission-dot .round { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
        .mission-dot .size { font-size: 18px; font-weight: 700; }

        .mission-dot.success { background: var(--success-light); border-color: var(--success); color: var(--success); }
        .mission-dot.fail { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
        .mission-dot.current { background: var(--success-light); border-color: var(--success); color: var(--success); box-shadow: 0 0 30px rgba(0, 212, 170, 0.4); }
        .mission-dot.current::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid var(--success);
            opacity: 0.5;
        }

        .control-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            border: 1px solid var(--border-color);
        }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
        .control-group { display: flex; flex-direction: column; gap: var(--space-3); }
        .control-group-title { font-size: 12px; color: var(--text-secondary); letter-spacing: 1px; }
        .control-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }

        .btn-control {
            padding: var(--space-3);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all var(--transition-normal);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            height: 64px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
        }

        .btn-control:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.12); }
        .btn-control.p1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .btn-control.p2 { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-control.danger { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); border: none; }
        .btn-control:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .bottom-action {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: var(--space-4);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: none;
            box-sizing: border-box;
        }

        .bottom-action:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5); }
        .bottom-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .bottom-action-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-4);
            font-size: 18px;
            font-weight: 600;
        }

        .now-playing-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            border: 1px solid var(--border-color);
        }

        .now-playing-section h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: var(--space-3); letter-spacing: 1px; }

        .now-playing-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--border-color);
            min-height: 80px;
        }

        .playing-info { display: flex; align-items: center; gap: 16px; }
        .playing-number { font-size: 36px; font-weight: 800; color: var(--success); min-width: 70px; text-align: center; text-shadow: 0 0 20px rgba(0, 212, 170, 0.5); }
        .playing-name { font-size: 14px; font-weight: 600; color: var(--text-primary); flex: 1; }

        .playing-progress { display: flex; align-items: center; gap: var(--space-2); }
        .progress-bar { flex: 1; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s; }
        .progress-text { font-size: 12px; color: var(--text-muted); min-width: 35px; text-align: right; }

        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

        .observability-panel, .feature-tracker {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            border: 1px solid var(--border-color);
            min-height: 300px;
        }

        .observability-panel h3, .feature-tracker h3 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: var(--space-3);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .log-container { display: flex; flex-direction: column; gap: var(--space-2); max-height: 250px; overflow-y: auto; }
        .log-entry { padding: var(--space-2) var(--space-3); background: rgba(255, 255, 255, 0.05); border-radius: 4px; font-size: 12px; border-left: 3px solid var(--info); }
        .log-entry .timestamp { color: var(--text-muted); margin-right: var(--space-2); }

        .feature-list { display: flex; flex-direction: column; gap: var(--space-2); }
        .feature-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3); background: rgba(255, 255, 255, 0.05); border-radius: var(--radius-md); border-left: 3px solid transparent; }
        .feature-item.completed { border-left-color: var(--success); background: var(--success-light); }
        .feature-item.active { border-left-color: var(--warning); background: var(--warning-light); }
        .feature-item .icon { font-size: 20px; width: 28px; text-align: center; }
        .feature-item .name { flex: 1; font-size: 14px; }
        .feature-item .status { font-size: 11px; padding: var(--space-1) var(--space-3); border-radius: 12px; background: rgba(255, 255, 255, 0.1); }

        @media (max-width: 900px) {
            .panel-header { flex-direction: column; gap: var(--space-3); text-align: center; }
            .header-right { width: 100%; justify-content: center; }
            .header-bar { grid-template-columns: repeat(2, 1fr); }
            .control-grid, .bottom-grid { grid-template-columns: 1fr; }
        }

        /* ===== 模态框样式 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: var(--space-4);
            color: var(--warning);
        }
        .modal-message {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: var(--space-6);
            line-height: 1.6;
        }
        .modal-buttons {
            display: flex;
            gap: var(--space-3);
            justify-content: center;
        }
        .modal-btn {
            padding: var(--space-3) var(--space-5);
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
        }
        .modal-btn-cancel {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .modal-btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .modal-btn-confirm {
            background: linear-gradient(135deg, var(--danger) 0%, #c0392b 100%);
            color: white;
        }
        .modal-btn-confirm:hover {
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        /* ===== 长按按钮样式 ===== */
        .btn-control {
            position: relative;
            overflow: hidden;
        }
        .long-press-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 0%;
            background: linear-gradient(90deg, var(--success) 0%, var(--warning) 100%);
            transition: width 0.1s linear;
            border-radius: 0 0 0 var(--radius-md);
        }
        .btn-control.long-pressing .long-press-progress {
            width: 100%;
            transition: width 3s linear;
        }
        .btn-control.long-pressing {
            transform: scale(0.98);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        /* ===== 音频输出控制按钮（合并语音输出选择和蓝牙连接） ===== */
        .btn-audio-control {
            padding: 0 16px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-audio-control:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .btn-audio-control.web-mode {
            background: rgba(0, 212, 170, 0.3);
            border-color: var(--success);
        }
        .btn-audio-control.device-mode {
            background: rgba(102, 126, 234, 0.3);
            border-color: var(--primary-500);
        }
        .btn-audio-control.connecting {
            background: rgba(255, 193, 7, 0.3);
            border-color: var(--warning);
            animation: pulse 1s infinite;
        }
        .btn-audio-control .icon {
            font-size: 18px;
        }
        .btn-audio-control .label {
            font-size: 13px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 音频模式选择弹窗 */
        .audio-mode-popup {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px;
            z-index: 1000;
            min-width: 220px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .audio-mode-popup.show { display: block; }
        .audio-mode-popup-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .audio-mode-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }
        .audio-mode-option:hover { background: rgba(255,255,255,0.08); }
        .audio-mode-option.active {
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid var(--success);
        }
        .audio-mode-option .icon { font-size: 20px; }
        .audio-mode-option .label { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }
        .audio-mode-option .status { font-size: 11px; color: var(--success); }
        .audio-mode-option .desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <!-- 模态框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">⚠️ 确认操作</div>
            <div class="modal-message" id="modalMessage">确定要执行此操作吗？</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn" onclick="confirmModalAction()">确定</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-panel">
            <!-- 面板头部 -->
            <div class="panel-header">
                <div class="header-left">
                    <h1>🎭 阿瓦隆语音主控面板</h1>
                    <div class="subtitle">创建房间 & 游戏控制一体化</div>
                </div>
                <div class="header-right">
                    <a href="/lobby.html" class="btn-lobby" title="大厅">
                        <span></span>
                        <span>大厅</span>
                    </a>
                    <div class="audio-output-wrapper" style="position:relative;">
                        <button class="btn-audio-control web-mode" onclick="toggleAudioMode(event)" id="btn-audio-control" title="音频输出设置">
                            <span class="icon" id="audio-control-icon">🔊</span>
                            <span class="label" id="audio-control-label">网页播放</span>
                        </button>
                        <div class="audio-mode-popup" id="audio-mode-popup">
                            <div class="audio-mode-popup-title">选择音频输出方式</div>
                            <div class="audio-mode-option active" onclick="setAudioMode(event, 'web')" id="mode-option-web">
                                <span class="icon">🔊</span>
                                <div style="flex:1">
                                    <div class="label">网页播放</div>
                                    <div class="desc">使用浏览器播放语音</div>
                                </div>
                                <span class="status" id="status-web">当前</span>
                            </div>
                            <div class="audio-mode-option" onclick="setAudioMode(event, 'device')" id="mode-option-device">
                                <span class="icon">📱</span>
                                <div style="flex:1">
                                    <div class="label">设备播放</div>
                                    <div class="desc">连接蓝牙音箱播放</div>
                                </div>

        const numVoiceMap = {
            0: 'NUM-0', 1: 'NUM-1', 2: 'NUM-2', 3: 'NUM-3', 4: 'NUM-4',
            5: 'NUM-5', 6: 'NUM-6', 7: 'NUM-7', 8: 'NUM-8', 9: 'NUM-9', 10: 'NUM-10'
